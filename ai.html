<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Travel Spinner Game</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  margin: 0;
  text-align: center;
}

h1 {
  color: white;
  margin-top: 20px;
}

.container {
  background: white;
  max-width: 520px;
  margin: 25px auto;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

input {
  padding: 10px;
  width: 65%;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background-color: #ff6f91;
  color: white;
  cursor: pointer;
  margin: 5px;
}

button:hover {
  background-color: #ff3e6c;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: #f7f7f7;
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

.completed {
  text-decoration: line-through;
  color: gray;
}

.spinner {
  margin: 20px auto;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: 10px solid #eee;
  position: relative;
  overflow: hidden;
}

.pointer {
  width: 0;
  height: 0;
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-bottom: 20px solid #333;
  margin: 0 auto;
}

.result {
  font-size: 18px;
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>
<body>

<h1>🎡 Dream Trip Spinner</h1>

<div class="container">
  <input type="text" id="destinationInput" placeholder="Add dream destination...">
  <button onclick="addDestination()">Add</button>

  <ul id="list"></ul>

  <div class="spinner" id="spinner"></div>
  <div class="pointer"></div>

  <button onclick="spin()">Spin for Dream Trip ✈️</button>

  <div class="result" id="result">Where will you go? 👀</div>
</div>

<script>
let destinations = [];

function addDestination() {
  const input = document.getElementById('destinationInput');
  const value = input.value.trim();

  if (value === '') return;

  destinations.push(value);

  const li = document.createElement('li');
  li.textContent = value;

  const deleteBtn = document.createElement('button');
  deleteBtn.textContent = '❌';
  deleteBtn.onclick = function() {
    destinations = destinations.filter(d => d !== value);
    li.remove();
  };

  li.appendChild(deleteBtn);
  document.getElementById('list').appendChild(li);

  input.value = '';
}

function spin() {
  if (destinations.length === 0) {
    alert('Add some dream destinations first! 🌍');
    return;
  }

  const randomIndex = Math.floor(Math.random() * destinations.length);
  const result = destinations[randomIndex];

  const spinner = document.getElementById('spinner');
  const degrees = 720 + Math.random() * 360;

  spinner.style.transition = 'transform 2s ease-out';
  spinner.style.transform = `rotate(${degrees}deg)`;

  setTimeout(() => {
    document.getElementById('result').textContent = '✨ Your dream trip: ' + result;
  }, 2000);
}
</script>

</body>
</html>
